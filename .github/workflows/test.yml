name: Tunnel Config Generator
on: workflow_dispatch
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate WireGuard Config
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq wireguard-tools
          
          # تولید کلیدهای WireGuard
          wg genkey | tee /tmp/server_private.key | wg pubkey > /tmp/server_public.key
          wg genkey | tee /tmp/client_private.key | wg pubkey > /tmp/client_public.key
          
          SERVER_PRIV=$(cat /tmp/server_private.key)
          SERVER_PUB=$(cat /tmp/server_public.key)
          CLIENT_PRIV=$(cat /tmp/client_private.key)
          CLIENT_PUB=$(cat /tmp/client_public.key)
          
          # ساخت فایل کانفیگ سرور
          cat > /tmp/server.conf << EOF
          [Interface]
          PrivateKey = ${SERVER_PRIV}
          Address = 10.13.13.1/24
          ListenPort = 51820
          
          [Peer]
          PublicKey = ${CLIENT_PUB}
          AllowedIPs = 10.13.13.2/32
          EOF
          
          # ساخت فایل کانفیگ کلاینت
          cat > /tmp/client.conf << EOF
          [Interface]
          PrivateKey = ${CLIENT_PRIV}
          Address = 10.13.13.2/24
          DNS = 1.1.1.1
          
          [Peer]
          PublicKey = ${SERVER_PUB}
          Endpoint = 127.0.0.1:51820
          AllowedIPs = 0.0.0.0/0
          PersistentKeepalive = 25
          EOF
          
          echo "========================================"
          echo "BASE64_CLIENT_CONFIG_START"
          base64 /tmp/client.conf
          echo "BASE64_CLIENT_CONFIG_END"
          echo "========================================"
          
          # حالا سرور رو راه بنداز
          sudo wg-quick up /tmp/server.conf
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
          
          echo "WIREGUARD_SERVER_RUNNING"
          
          # ۶ ساعت نگه دار
          sleep 21600

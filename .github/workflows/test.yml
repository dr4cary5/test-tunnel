name: Mailbox Server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Mailbox Server
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq curl jq
          
          echo "========================================"
          echo "MAILBOX_SERVER_READY"
          echo "Server is listening for commands via repo files"
          echo "========================================"
          
          # لوپ اصلی: هر ۳ ثانیه فایل درخواست رو چک کن
          while true; do
            # خوندن درخواست از فایل client_to_server.txt
            RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/dr4cary5/test-tunnel/contents/mailbox/client_to_server.txt 2>/dev/null \
              | jq -r '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
            
            if [ ! -z "$RESPONSE" ]; then
              echo "[$(date)] Received: $RESPONSE"
              
              # اجرای دستور
              OUTPUT=$(eval "$RESPONSE" 2>&1)
              OUTPUT_B64=$(echo "$OUTPUT" | base64 -w0)
              
              # گرفتن SHA فایل پاسخ (اگر وجود داره)
              SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/dr4cary5/test-tunnel/contents/mailbox/server_to_client.txt 2>/dev/null \
                | jq -r '.sha' 2>/dev/null || echo "")
              
              # ساخت body درخواست
              if [ -z "$SHA" ]; then
                BODY="{\"message\":\"response\",\"content\":\"$OUTPUT_B64\"}"
              else
                BODY="{\"message\":\"response\",\"content\":\"$OUTPUT_B64\",\"sha\":\"$SHA\"}"
              fi
              
              # ارسال پاسخ به فایل server_to_client.txt
              curl -s -X PUT \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/dr4cary5/test-tunnel/contents/mailbox/server_to_client.txt \
                -d "$BODY" > /dev/null
              
              echo "[$(date)] Response sent (${#OUTPUT} bytes)"
            fi
            
            sleep 3
          done
